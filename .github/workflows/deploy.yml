name: Deploy to Sakura Internet

on:
  push:
    branches:
      - master  # または main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy via rsync
        uses: Burnett01/rsync-deployments@7.0.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /home/duet/www/hirameki/
          remote_host: duet.sakura.ne.jp
          remote_user: duet
          remote_key: ${{ secrets.SAKURA_SSH_PRIVATE_KEY }}
